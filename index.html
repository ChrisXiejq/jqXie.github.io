      <h1>A Machine-Learning-Centered Evaluation of Conversational AI for Oral English Learning</h1>
      <div class="sub">Student Number: 25027138 · GitHub Pages Ready Single-File Blog</div>
    </section>

    <article id="content"></article>

  <script>
    const md = "# A Machine-Learning-Centered Evaluation of Conversational AI for Oral English Learning\n*Student Number: 25027138 \u00b7 Course blog / ELEC0139*\n---\n\n## Abstract\n\nGenerative AI and conversational agents are now widely promoted as a solution to long-standing bottlenecks in language education,\nespecially in spoken English learning\nwhere high-frequency practice and individualized feedback have long been limited by cost,\nteacher availability, and institutional capacity.\nMuch public discourse is portraying AI as a substitute for teachers and claiming that\nintroducing AI to education will solve all the problems such as educational inequality.\nHowever, this blog goes beyond simply implementing AI in education,\nand argues that conversational AI can meaningfully improve language learning\nonly under specific conditions: pedagogically aligned task design,\nrobust fairness testing across learner populations,\ntransparent feedback, data protection,\nand sustained teacher oversight.\nThese conditions are essential points for AI to gain trust and perform ethically in the education industry.\n\nThe analysis is organized in three parts. First, the blog discusses the application domain (oral English education),\ninvestigating the current challenges and the case for AI/ML adoption.\nSecond, it introduces the main AI/ML technologies that can address these challenges,\nand explains their mechanisms, tradeoffs, and possible mitigation strategies.\nThird, it turns to the wider ethical aspects of AI/ML in language education,\narguing that fairness, privacy, explainability, and accountability should be taken into consideration as a whole.\nAs a consequence, this article proposes a conditional deployment framework:\nAI should be treated as infrastructure for high-frequency practice and formative feedback,\nembedded within transparent pedagogy, fair ML evaluation, and strictly regulated governance.\n\n## Introduction: What Counts as \"Meaningful Improvement\" in Oral English Education?\n\nOral English learning is one of the most challenging domains in language education.\nIt depends heavily on speaker-listener interaction, immediate feedback and confidence-building over time.\nUnlike reading or listening tasks, where learners can practice independently and receive delayed and objective feedback,\noral learning requires learners to practice with a teacher or a partner, and improve by the feedbacks.\nTherefore, oral English learning is a high-interaction task that requires a lot of educational resources and time,\nwhich potentially leads to inequality since resources are limited for most learners.\n\nMany educational institutions are now considering introducing AI to language education,\nconsidering that compared to human teachers, AI can provide more consistent and immediate feedback,\nand can scale to a larger number of learners at lower costs.\nCurrently, AI capabilities have advanced rapidly. Since 2023,\nmainstream AI technologies have moved from text-only tutoring prototypes to multimodal,\nspeech-based systems.\nIn 2024, OpenAI released GPT-4o with near-real-time multimodal interaction capabilities\nand reported substantially lower audio-interaction latency than earlier pipeline architectures (OpenAI, 2024).\nAcross the industry, this development has fueled expectations that AI could function as a \"24/7 speaking tutor.\"\nAt the governance level, the EU AI Act entered into force in August 2024,\nwith staged obligations in 2025 and 2026, and the General-Purpose AI Code of Practice was published\nin July 2025 as a voluntary compliance instrument for GPAI providers (European Commission, 2025; European Commission, 2026),\nwhich indicates the regulation of AI is becoming more mature.\n\nThe dilemma is that simply introducing AI to education is not equivalent to educational improvement.\nThis distinction motivates the thesis of this blog.\n\n>\n\\textbf{Conversational AI can improve oral English learning mainly by increasing speaking opportunities,\nreducing feedback latency, and supporting individualized patterns;\nhowever, such gains become educationally meaningful only when systems satisfy ethically acceptable conditions:\npedagogical alignment, subgroup-robust ML performance,\ntransparent feedback, privacy and data protection, accountability, and teacher-in-the-loop oversight.}\n\n## Application Domain, Current Challenges, and the Case for AI/ML Adoption\n\nThis section defines the oral English learning domain,\noutlines current challenges, and explains why AI/ML adoption can be a rational solution to these challenges.\n\n### Domain Definition: a High-Interaction Educational Task\n\nThe majority of English learners are non-native speakers.\nIn the education industry, there are two main types of English learners:\n\n- **Test-preparation**: preparation for IELTS/TOEFL speaking tasks where learners require structured fluency, grammar precision, and coherent argumentation under time constraints.\n- **Communication-driven**: workplace, study abroad, and intercultural communication where communicative appropriateness, interaction management, and confidence matter more.\n\nIn traditional oral English learning, learners often rely on one-to-one or one-to-many speaking feedback,\nwhich is expensive and time-consuming.\nLearners rush to their personal tutors at fixed time slots, mostly 2 hours per week,\nto practice their speaking skills on merely two or three topics.\nSuch limited practice time and topic variety are not enough to improve their speaking skills,\nbut expanding practice time normally leads to unaffordable costs.\n\nMoreover, oral English competence is far beyond giving a right answer.\nIt requires learners to have a good command of grammar, vocabulary, pronunciation, and fluency.\nThe learners have to keep practicing these skills over time, and fresh starters often improve slowly by imitating the teacher,\nwhich leads to high demand for teacher resources and time.\n\nRegarding these domain features, ML-centered analysis is suitable because this domain is data-rich and sequential.\nSpeech signals can be represented as audio streams, and linguistic outputs can be represented as transcripts.\nModels can also analyze temporal trajectories such as turn-taking, pause patterns, and communicative behaviours.\nThe overall learning progress can be tracked through longitudinal traces including error recurrences,\nstrategic shifts, and confidence improvements.\n\nTherefore, oral English learning is a naturally multimodal sequence-learning environment,\nmaking it an ideal domain for speech ML, NLP, RL, and teacher-in-the-loop system design.\n\n### Challenges in Oral Learning\n\nA high-quality oral English learning curriculum requires more than content delivery.\nIt requires sustained cycles of speaking practice, feedback, and correction:\n- **Production** (learner speaks);\n- **Diagnosis** (what errors occurred and why);\n- **Feedback** (how to improve);\n- **Correction** (apply the feedback in a new context);\n- **Confidence Stabilization** (maintain confidence and willingness to speak).\n\nTherefore, oral English learning cannot be reduced to merely memorizing vocabulary and grammar;\nit depends on repeated practice, being corrected and reinforced over time, and becoming familiar with various speaking contexts.\n\nHowever, the traditional oral English learning system is not able to scale this loop efficiently.\nTaking exam preparation as an example, a novice learner may require intensive coaching to produce even short,\ncoherent spoken responses on unfamiliar topics, and building durable spoken fluency typically takes months of sustained practice.\nMoreover, proficiency decays quickly without continued practice, making the long-term practice routine necessary.\n\n#### Resource Constraint: Instructor Bandwidth and Cost\n\nAs is explained in section the relevant section,\noral English learning generally requires one-to-one or one-to-many speaking practice and immediate feedback,\nwhich is the main reason why oral English learning is hard to scale and expensive.\nGroup classes reduce cost but also reduce individual speaking time and personalized correction,\nwhile one-to-one feedback is too expensive for many to afford.\nIn exam-focused education markets, for example IELTS and TOEFL, premium coaching only exists in elite institutions and\nin socioeconomically advantaged regions, which leaves learners in low-income regions with limited access to qualified instructors.\nUNESCO estimates that about 44 million additional teachers are needed globally by 2030,\nwhich suggests that instructor scarcity is a structural capacity constraint rather than a short-term issue (UNESCO, 2023).\n\nThis is not a temporary issue; it is a structural constraint tied to human labor economics.\nUnlike subjects that can be studied primarily through textbooks and problem sets, such as mathematics,\noral practice requires an interactive speaking environment with a teacher or a partner.\nIn communities where English speakers are scarce,\nlearners may face high costs for private tutoring or forfeit practice opportunities altogether.\n\n#### Temporal Constraint: Feedback Latency\n\nFeedback latency is another important constraint that makes oral learning hard to scale.\nIf correction arrives too late or too vaguely,\nlearners may consolidate incorrect pronunciation or discourse patterns.\nHuman-only systems often cannot sustain high-frequency immediate feedback outside scheduled class sessions.\nAs a consequence, learners may fail to revise and repair errors immediately.\nMoreover, considering the limited practice time and topic variety,\nthe feedback given by human instructors is often vague and may only cover a few errors.\n\n#### Measurement Constraint: Difficulty of Tracking Overall Oral Progress\n\nOral competence is multidimensional: pronunciation, fluency, grammatical control, interactional willingness,\nand practical appropriateness.\nTo track the overall learning progress, institutions often rely on periodic tests,\nwhich is not a good way to measure the overall learning progress\nbecause it only focuses on certain dimensions and is not comprehensive.\nIn one-to-many classes, a single instructor may struggle to monitor all these dimensions for every learner,\nwhich can weaken feedback quality and lead to the under-detection of persistent errors.\n\n#### Personalization Constraint: Learner Diversity\n\nTraditional oral English learning faces the challenge of learner diversity.\nCompared to other subjects, which mostly consider learners' intelligibility or thinking ability only,\noral English learning is more sensitive to learner background.\nIn this domain, teachers have to take into consideration that learners differ in first-language transfer effects,\naccent background, anxiety level, motivation pattern,\nand target scenario such as exam interview or business negotiation.\n\nStatic curricular pacing cannot fully satisfy everyone's needs,\nand it would be difficult to tailor instruction and speaking materials to individual learners.\nMoreover, instructors may default to familiar teaching routines,\nwhich can lead to the problem of ignoring some learners' needs and preferences.\n\n#### Psychological Constraint: Speaking Anxiety and Participation Avoidance\n\nTo speak to a teacher or a partner, learners have to overcome their speaking anxiety and unwillingness to participate.\nMany learners avoid speaking because they fear negative judgment, or they just refuse to speak in front of others.\nThis creates a cycle that can lead to the learners' speaking ability being stuck at a low level:\n\n- less speaking $\\rightarrow$ slower improvement $\\rightarrow$ lower confidence $\\rightarrow$ less speaking.\n\nSimply encouraging learners to speak is not enough.\nLearners need to be provided with a safe and supportive environment to speak,\nand the environment should be designed to be friendly and engaging.\nHowever, such methods are hard to implement in practice, which generally increases the costs and lays extra workload on teachers.\n\n### Why AI/ML Is Rational in This Domain\n\nThe constraints mentioned in section the relevant section are mainly caused by the labor resource limitation\nwhich is hard to solve in traditional human-only systems.\nAt the same time, around 70\\% of 10-year-olds in low- and middle-income countries are estimated to face learning poverty,\nwhich highlights the scale pressure for scalable support tools in foundational learning systems (World Bank, 2024).\nThe education industry can take advantage of AI/ML that is scalable and cost-effective to address these constraints.\nHowever, AI/ML is rational in oral English education only when implemented as augmentation rather than replacement.\n\n#### Scale and Availability Argument\n\nML systems can provide continuous practice sessions at low marginal cost, which directly addresses these constraints.\nA learner can practice speaking with the system at any time and any place,\nnot being limited by the instructor's availability and the learner's schedule.\nIn traditional classroom settings, individual learners' access to the teacher is constrained by scarce instructor time;\nBut with AI-enhanced practice, available learning time is effectively bounded by learner motivation\nand device access rather than by a fixed schedule.\n\nThe online ML systems also address the problem caused by unevenly distributed instructor resources.\nLearners in regions with limited teacher resources can access the system as well,\nnarrowing the educational gap between advantaged and disadvantaged regions.\n\n#### Feedback-Latency Argument\n\nASR + LLM pipelines can generate immediate formative feedback after each speaking attempt\nand receiving feedback no longer requires waiting for several days or weeks.\nWhen feedback is timely, learners can correct errors once they have made the mistakes,\nwhich potentially increases learning efficiency and reduces the risk of errors being consolidated.\n\n#### Data-Visibility Argument\n\nAI systems can memorize long-term learning traces that humans cannot manually aggregate at scale, including:\n- error persistence;\n- topic-level confidence;\n- turn-taking stability;\n- pronunciation trend;\n- vocabulary expansion trajectory.\nAlso, as it is difficult for a single human instructor to clearly track every learner's progress in the classroom,\nthe context and memory components of AI systems can set up personalized data collection and aggregation for each learner.\nFor different learners, AI will collect their past learning traces and analyze their learning patterns and progress,\nwhich can support better pedagogical decision-making when interpreted responsibly.\n\n#### Adaptive Pathway Argument\n\nLearners can set their own learning goals and choose their own learning paths,\nwhich can reduce the frustration and improve the sustained engagement.\nML systems can also generate personalized speaking materials and tasks for every individual learner,\nwhich can improve the learning efficiency and reduce the human workload.\n\n#### Psychological Argument\n\nMany students initially feel anxious speaking with instructors,\nyet may feel more comfortable practicing with software interfaces that reduce perceived social evaluation.\nAfter becoming accustomed to speaking confidently, they may switch to talking to teachers and gain better learning experiences.\nImplementing AI/ML in oral English learning can reduce learners' pressure and improve their confidence,\nlaying a solid foundation for them to speak with others confidently later on.\n\n## How Different AI/ML Technologies Address Domain Challenges\n\nThis section explains how different machine-learning components work together to address the practical challenges outlined above.\nTo fully support oral English learning, the ML technologies should be implemented as a pipeline that includes:\n- **Automatic Speech Recognition (ASR)**: raw speech is cleaned and segmented, converted into text with uncertainty estimates;\n- **Pronunciation and Prosody Scoring Models**: diagnosed for linguistic issues;\n- **Large Language Models (LLMs)**: turned into feedback and dialogue moves;\n- **Dialogue Management and Agentic Orchestration**: adapted over time through learner modeling and policy decisions about when to intervene and when to turn to a teacher.\n\nASR converts speech to text and ideally returns confidence scores alongside tokens,\nwhich is then diagnosed for linguistic issues by pronunciation and prosody scoring models.\nThe LLMs then produce contextual replies and feedback for learners,\nand the dialogue management and agentic orchestration module controls the feedback timing, traces aggregation and learner modeling.\nThese together build a coherent pipeline for oral English learning.\n\n### Recent Developments in AI/ML in Language Education\n\nRecent real-time multimodal systems have made low-latency speech interaction feel dramatically more natural,\nproviding richer vocal cues compared with older cascaded pipelines.\nThree developments make oral-language AI especially important now:\n- **Multimodal real-time model availability**:\nOpenAI's 2024 GPT-4o release emphasized near-human latency and integrated audio-text-vision processing\n(OpenAI, 2024), which makes systems now support low-latency speech interaction at scale;\n- **Regulatory Acceleration**:\nthe EU AI Act timeline has moved from proposal to published obligations;\n- **Education Governance Pressure**: UNESCO's guidance on generative AI in education (2023, updated in 2026)\ncontinues to emphasize human-centered design, age-appropriate safeguards,\nand data protection in school settings (Miao & Holmes, 2023; Miao & Holmes, 2026).\n\nThe reduction of latency is important for language education because timing and conversational responsiveness\nsignificantly impact the perceived interaction quality and speaking confidence.\nOfficials are also paying more attention to the privacy and security of the audio streams.\nHowever, real-time interaction leaves less room for observation,\nincreases the risk of immediate but incorrect corrections, and raises privacy sensitivity when audio is streamed continuously.\nTherefore, the governance of the real-time interactions is becoming more and more important.\nThis expands both opportunities and risks for the AI/ML technologies in oral English learning.\n\n### Automatic Speech Recognition (ASR): Foundation Model for Spoken Inputs\n\n#### Mechanisms\nModern ASR is built on self-supervised speech representation learning such as wav2vec-style pretraining,\nwhich is followed by sequence modeling with CTC, RNN-T, or related transducer architectures.\nAnd often model-assisted decoding is used later to improve contextual transcription.\nIn practice, the system outputs token hypotheses as well as confidence estimates,\nand those estimates matter for education since uncertain recognition should not be treated as learner errors.\n\nBecause ASR makes immediate transcription possible,\nit directly supports the feedback-latency challenge described in section the relevant section.\nFurthermore, it can track recurring patterns such as mispronunciations, hesitations and pauses over time,\nwhich can provide valuable insights for personalized learning and feedback,\nreducing repetitive instructor workload while still leaving room for human judgment.\n\n#### Tradeoffs\nThe tradeoffs are mostly related to ML-specific issues.\nWord error rates can vary substantially by accent, dialect, and recording conditions,\nand the accent robustness gap cannot be solved by simply averaging performance across users (Koenecke et al., 2020).\nOutside the classroom, learners may record in noisy environments or with low-quality microphones,\nwhich is significantly different from training data and raises reliability concerns.\nFinally, confidence scores can be miscalibrated, if the system is overconfident when wrong,\ndownstream feedback can mislead learners and reinforce incorrect forms.\n\nDespite these ML-oriented issues, implementing ASR into oral English learning also brings domain-specific challenges.\nAcoustic similarity is not the same as communicative intelligibility since \"standard accent\" norms can encode cultural-linguistic bias.\nAnd human ratings in training data can be noisy or inconsistent,\nwhich can lead to biased evaluation and decision-making.\n\n#### How to Mitigate the Limits\nTo push the boundaries and overcome the limits,\nmitigation typically combines data-side augmentation (accent-diverse corpora), calibration (subgroup-aware thresholds),\ninterface-side uncertainty (labeling low-confidence spans),\nand human review where decisions are consequential.\n\n### Pronunciation and Prosody Scoring Models\n\n#### Mechanisms\n\nBeyond transcription, many systems add pronunciation and prosody scoring models that use phone-level posteriors,\nprosodic features such as stress and intonation,\nand temporal features such as speech rate and pause patterns.\nThese models can be supervised on annotated learner speech or teacher-rated corpora,\nand they help connect acoustic detail to instructional goals.\n\nIn domain terms, this layer supports personalization by highlighting pronunciation difficulties,\nsupports progress tracking by showing trends over weeks rather than single sessions,\nand can align practice feedback with exam-style rubrics when those rubrics are explicitly modeled.\n\n#### Tradeoffs\nThe tradeoffs are familiar in ML: acoustic similarity is not the same as communicative intelligibility;\n\"standard accent\" norms can encode cultural-linguistic bias;\nand human ratings in training data can be noisy or inconsistent.\n\n#### How to Mitigate the Tradeoffs\nStronger systems often separate intelligibility risk from accent conformity,\ntrain with multi-rater supervision to model rater variance,\nand validate against listener-based intelligibility where possible.\n\n### Large Language Models (LLMs): Conversational and Feedback Core\n\n#### Mechanisms\nTo successfully analyze the input and generate appropriate feedback,\nthe system typically relies on a pretrained transformer with instruction tuning for teaching behavior,\npreference optimization such as RLHF/DPO-style to shape response quality (Ouyang et al., 2022),\nsafety constraints, and retrieval augmentation for grounded explanations (Lewis et al., 2020).\nFine-tuned LLMs can also be used to generate speaking tasks and scenarios,\nwhich can help learners practice in a more realistic environment.\nIn oral tutoring, LLMs not only answer questions, but also generate justifications and explanations for the corrections,\nhelping learners understand the corrections and improve their learning.\nMoreover, LLMs can be enhanced with external knowledge bases to provide more accurate and relevant information,\nand with reinforcement learning to improve the response quality and safety.\nPast context across turns can be integrated to provide a more comprehensive understanding of the learner's learning progress.\n\nDue to the ability to generate diverse speaking tasks, give personalized feedback,\nand support low-pressure practice that reduces anxiety, LLMs can help learners practice effectively with more confidence.\nLLMs can also simulate realistic speaking scenarios such as interviews or business meetings at scale,\nwhich can help learners practice in a more realistic environment.\n\n#### Tradeoffs\nThe tradeoffs should also be taken into consideration, among which hallucinations are the most serious.\nHallucinations can produce plausible but incorrect linguistic claims (Ji et al., 2023),\nand model outputs may be overconfident even when incorrect.\nThis may lead learners to consolidate wrong knowledge without being aware of it.\n\nFurthermore, optimization targets tuned for engagement may trade away corrective precision,\nand it may be difficult to balance the learning-oriented signals with the learners' wellbeing.\nThe limited context tokens also make it difficult to integrate long-term learner histories into the conversation.\nThis may lead to inconsistent feedback and learning progress tracking.\n\n#### How to Mitigate the Tradeoffs\n\nTo eliminate the hallucinations, the system can be trained with more diverse training data,\nand the hallucinations can be mitigated by using more robust models and more diverse retrieval sources.\nOptimization targets should be set to balance the learning-oriented signals with wellbeing, rather than solely focusing on engagement.\nAs for context token limitation, the system can be enhanced with more advanced context management techniques,\nsuch as long context windows, context compression, and context retrieval.\n\n### Dialogue Management and Agentic Orchestration\n\n#### Mechanisms\nMerely relying on LLMs is not enough to address the challenges in oral English learning.\nA conversational agent layer is needed to track the dialogue state, store the learner profile and prior errors,\nchoose the next instructional move, and define the escalation rules.\nThis agent harnessing layer is what truly turns the short chats into a sustained learning path.\nIt remembers goals across sessions, adjusts difficulty as performance changes,\nand can package learner progress into summaries that help teachers intervene where it matters.\n\n#### Tradeoffs\n\nThere are still some tradeoffs to be considered.\nAn early mislabel of proficiency or learning style can steer a learner toward the wrong drills for weeks.\nMoreover, if the system focuses too much on engagement metrics such as time on task, session length,\nit may simply improve certain metrics without improving speaking quality.\nThe historical data may be poorly captured since there may be many useless sentences or conversations in the past practice,\nwhich can introduce noise and bias into the learner model.\n\n#### How to Mitigate the Tradeoffs\nTo mitigate the tradeoffs, the system should keep human overrides for both learners and teachers,\ncarefully consider the learner's learning progress and performance, and adjust the difficulty of the tasks accordingly.\nThe system should also assign appropriate weights to the learning-quality signals and engagement signals,\nrather than solely focusing on engagement metrics.\nMoreover, importance thresholds can be implemented when the agent tries to memorize the conversation history,\nleaving the unimportant information to be forgotten,\nwhich helps the agent to optimize memory usage and keep the context clean and meaningful.\n\n### Evaluation Framework for ML in Oral Education\n\nHow to evaluate the ML technologies in an oral English learning scenario is a critical question.\nIn traditional evaluation, the system is evaluated by the aggregate accuracy,\nwhich in this case only indicates the system's ability to transcribe the speech correctly\nrather than the ability to provide meaningful feedback and help learners improve their speaking skills.\n\nSpecific and tailored evaluation measures should be introduced to give a more comprehensive view of the system's performance.\nASR quality should be reported with word/character error rates, calibration quality, and robustness under various acoustic conditions.\nDiagnostic modules should be evaluated against expert agreement on error categories.\nLLMs should be tested for faithfulness to the teaching goals and pedagogical consistency as well as harmful outputs.\nThe agent should be evaluated for whether it can recognize the learner's learning progress and performance,\nprovide meaningful historical context for both the LLMs and the learners,\nand adjust the difficulty of the tasks accordingly.\nSystem-level outcomes should include transfer to human conversation, learner confidence trajectories, and teacher workload impacts.\nWithout this layered view, deployment decisions become persuasive but weakly evidenced.\n\n## Wider Ethical Implications of AI/ML in Language Education\n\nWhat matters more is the ethical implications of the AI/ML technologies in oral English learning,\nrather than simply implementing the technologies into this domain.\nEthics should be built into what models optimize for, what data they learn from, and how outputs are used properly,\nrather than being considered as independent issues.\nThe aim here is not to simply compile a checklist of concerns,\nbut to connect each concern to concrete ML mechanisms and deployment choices.\n\n### Bias and Fairness: From Model Error to Educational Opportunity\n\nIn oral English education, a single error may direct the learner to the wrong learning path,\nand such effects can accumulate over weeks.\nFor example, if some words are misrecognized more often than others due to the accent or dialect,\nthe learners may receive lower automated scores, sharper corrections, or misleading next-step recommendations,\nwhich not only downgrades the learners' confidence, but also gives wrong guidance to the learners.\nAccording to Koenecke et al. (2020), the disparity patterns in commercial ASR can be documented,\nwhich indicates that the recognition error of ASR introduces risks into the learning process.\nIn that study, average word error rates were approximately 0.35 for Black speakers versus 0.19 for White speakers,\nshowing a substantial subgroup gap that can propagate into educational feedback quality (Koenecke et al., 2020).\n\nFurthermore, bias can enter at many points in the ML pipeline.\nTraining data may represent learner speech diversity poorly,\nand labels may be noisy because teachers and raters disagree.\nOptimization may chase a strong average while hiding subgroup harm,\nwhich penalizes those who speak with certain accents or dialects.\n\nTherefore, fairness is not a static concept, but a moving target once users and models evolve.\nBiases caused by different subgroups including accent, dialect, proficiency bands, and device contexts should be considered.\nThe implementation and publication of the system should be transparent and reviewable by humans,\nhonestly report the limitations and risks of the system,\nand monitor the drift after deployment.\n\n### Unverified Content and Monitoring Issues\n\nAlthough recent multimodal releases enable low-latency speech interaction,\nthis introduces new risks of revealing unverified content to the learners.\nIt becomes more difficult to insert moderation, factual checks and review into the system.\nFurthermore, the model may expose harmful information such as hate speech, violence, or other sensitive topics,\nwhich can harm the learners' mental health and safety.\n\nA useful design is that LLMs should only generate content based on retrieved knowledge and policies\nfrom the verified knowledge bases.\nSuch design will slow down the response time, but it can help the system to avoid revealing unverified content to the learners\nand stay within the safety boundaries.\n\nThere is a second monitoring issue: the model drift.\nThe model may drift over time due to the changes of the training data,\nthe changes of the environment, or the changes of the policies.\nSilent model changes can alter correction tone, difficulty, and recommendations without teachers noticing,\nwhich harms trust and may lead to misinterpretation of the system's behavior.\nIn this case, the system should be versioned and monitored to detect the drift,\nand the system should be evaluated and monitored to ensure the performance is stable and effective.\nTo achieve this goal, every version of the system should be reviewed and approved by the teachers and the learners.\n\n### Privacy and Data Protection\n\nOral AI systems are data-intensive and collect enormously rich traces including audio,\ntranscripts, timing and personal information. Most of these features contain more or less learners' private data.\nFor example, the hottest topics in IELTS speaking are those about personal experiences,\nfamily and friends, and future plans. These topics are sensitive and should be protected.\nThe system may also absorb information from the learners' device, such as the device ID, IP address, and browser history.\n\nThere have been some regulations and policies to protect the privacy of the learners' data,\nsuch as GDPR-style principles (EU, 2016),\nContextual integrity theory (Nissenbaum, 2010),\nand the principles of data protection (Miao & Holmes, 2023; Miao & Holmes, 2026).\nThese principles emphasize the importance of the privacy of the learners' data,\nrequire the system to be transparent and accountable for the data processing,\nand minimize the data collection and retention.\n\nThe rapid development of real-time voice interaction in 2024\u20132026 makes the risk profile more complex.\nThe line between learning analytics and profiling is becoming more and more blurred,\nand concerns have been raised about not only the single logged query, but also the long audio stream that can support fine-grained behavioral inference.\n\nTo solve this problem, the system should take responsible measures for data protection,\nsuch as designing for minimal retention of raw audio unless there is a clear pedagogical reason,\ndisclosing subprocessors, tightening protections for minors, and making deletion and export realistic rather than nominal.\n\n### Explainability and Interpretability\n\nExplainability is the foundation of learning:\nto successfully learn something basically means we have to know how to explain it.\nLearners need to see what went wrong and what to try next; teachers need to see why a recommendation was made,\nnot just that it appeared.\nIn practice, it means connecting feedback to identifiable patterns,\nconnecting next tasks to a visible learning goal,\nand connecting corrections to a rule or source learners can revisit.\nOnly by doing so can the ML outputs demonstrate trustworthiness and avoid misleading or wrong evaluation.\n\nLearners may over-trust fluent text, and teachers may be reduced to rubber-stamping system outputs\u2014\nan abstraction risk familiar in sociotechnical accounts of ML systems (Selbst et al., 2019).\nThe uncertainty should be exposed and the confidence should be calibrated,\ngiving teachers and learners clear views of whether this information is reliable.\n\n### Accountability and Governance\n\nUnlike other ML systems that may only provide entertainment value,\neducational deployments have long-term impact on the learners' learning path and even their future life.\nTherefore, the accountability and governance of the system are more important than ever.\nReal educational deployments involve a chain including model provider,\nintegrator, school, and instructor. Therefore responsibility can blur precisely when something goes wrong.\n\nRecent EU-level developments around staged AI Act implementation and\nGPAI-related expectations have pushed documentation, transparency,\nand risk management further into mainstream procurement conversations (European Commission, 2025; European Commission, 2026).\nInstitutions should establish clear policies for accountability and governance, including:\nwho signs off on use cases, how incidents are reported, what logs exist for contested outcomes,\nand what learners can do when they disagree with an automated judgment.\n\n### Psychological and Developmental Ethics\n\nIn real-world education scenarios, the students' learning efficiency and confidence can be heavily\naffected by the teachers' attitude and behavior.\nIt stays the same for the AI-powered systems.\nIt is a genuine benefit for anxious speakers that private AI practice can reduce the fear of giving speeches.\nHowever, the downside is that constant scoring and correction can turn speaking into simple score-chasing rather than learning.\nOn the one hand, if the system continuously provides stricter corrections and feedback,\nit may harm the learners' confidence and willingness to speak.\nOn the other hand, if the system continuously provides too much encouragement and praise,\nit may encourage the learners to be over-confident and lazy.\n\nTherefore, the system should be designed to give appropriate feedback and encouragement at the right time.\nFurthermore, the system can be ethically designed to provide psychologically safe environment for the learners,\nsuch as offering no-score modes, using growth-oriented framing,\nand watching for dependence on prompts so that learners still learn to speak when the system is closed.\n\n### Equity and Digital Divide\n\nA low subscription price does not mean resource equality.\nAccess still depends on connectivity, devices\nand whether teachers have time to integrate tools into meaningful coursework.\nITU reports that around 2.6 billion people remained offline in 2023,\nwhich directly constrains equitable access to AI-mediated language practice (ITU, 2023).\nAI may widen practice access, but it can also widen implementation quality gaps across institutions.\nUNESCO's guidance on generative AI in education repeatedly stresses human-centered\nsafeguards and policy coherence (Miao & Holmes, 2023; Miao & Holmes, 2026).\nThese regulations increase the cost of monitoring and governance,\nand model training and cloud-heavy deployment have significant environmental costs and\ncan concentrate dependency on a handful of providers.\nThis may lead to another digital divide that only large institutions can afford to implement the system.\nHowever, in general, the system can help bridge the education gap\ncaused by the teacher distribution imbalance, providing more opportunities for the learners in the under-resourced areas.\n\n### Cultural and Linguistic Diversity\n\nIt is hard to define what is \"good English\" in the world, and there is no all-satisfying standard for this definition.\nSpeaking English well is not just about accent or proper grammar,\nbut also about the communicative effectiveness and the fluency.\nThe standard of \"good English\" can even shift over time and environment.\nFor example, in official settings, speakers should be more formal and polite,\nwhile in casual settings, speakers should be more natural and relaxed.\nHowever, models trained on dominant varieties can unintentionally treat difference as deficiency,\nwhich is both an ethical problem and a pedagogical mistake in multilingual classrooms.\nThe system should implement appropriate strategies in different environments and situations,\nsuch as using different prompts and response styles in different settings.\nThe cultural and linguistic diversity should also be considered and respected in the system design and evaluation.\n\n### Conclusion of the Ethics Discussion\n\nFairness, privacy, explainability, accountability, wellbeing, and equity are not independent features.\nFixing one while ignoring the rest is not enough,\nand the system may still look responsible on paper but fail in lived classroom consequences.\n\n## Conclusion: A Conditional Adoption Framework\n\nDevelopments from 2024\u20132026 make conversational deployment more realistic and raise the stakes of governance:\nreal-time multimodal interaction is increasingly available,\nwhile expectations around transparency and risk management are tightening.\nAI in oral English education is becoming a perfect direction for\npushing the boundaries of education equity and increasing education quality.\n\nHowever, the strategic question for oral English education is not whether AI will appear in classrooms,\nbut whether institutions can deploy it in ways that are ethically defensible.\nThe educational value of the AI/ML tools that can support this task is conditional,\nand the system should be treated as educational infrastructure, subject to pedagogy,\nevaluation, and governance, rather than as a consumer novelty.\n\nTaken together, the argument of this blog can be compressed into a small set of conditions\nfor using AI meaningfully in oral English education.\nFirst, tasks and feedback should align with explicit speaking competencies rather than single metrics like accuracy and fluency.\nSecond, subgroup-robust performance and well-calibrated uncertainty should be reported,\nnot by headline accuracy alone.\nThird, explanations must be transparent for learners and reviewable by teachers.\nFurthermore, privacy protection measures should be implemented to avoid misuse of sensitive data from the learners.\nFinally, responsibility and accountability should be clearly defined and implemented for the system.\nThese conditions are essential points for AI to gain trust and perform ethically in the education industry.\n";
    const article = document.getElementById("content");

    function inlineFormat(text){
      let t = text
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
      t = t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
      return t;
    }

    function slugify(s){
      return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    }

    const sectionIdMap = {
      "Abstract":"abstract",
      "Introduction: What Counts as \"Meaningful Improvement\" in Oral English Education?":"introduction",
      "Application Domain, Current Challenges, and the Case for AI/ML Adoption":"part1",
      "How Different AI/ML Technologies Address Domain Challenges":"part2",
      "Wider Ethical Implications of AI/ML in Language Education":"part3",
      "Synthesis: A Conditional Adoption Framework":"synthesis",
      "Conclusion":"conclusion",
      "References":"references"
    };

    let html = "";
    let inList = false;
    let paraBuffer = [];
    const lines = md.split(/\r?\n/);
    const flushParagraph = () => {
      if (!paraBuffer.length) return;
      html += `<p>${inlineFormat(paraBuffer.join(" "))}</p>`;
      paraBuffer = [];
    };
    for (const rawLine of lines){
      const line = rawLine.trim();
      if (line === "---"){ flushParagraph(); if(inList){html += "</ul>"; inList=false;} continue; }
      if (!line){ flushParagraph(); if(inList){html += "</ul>"; inList=false;} continue; }
      if (line.startsWith("# ")){ flushParagraph(); if(inList){html += "</ul>"; inList=false;} continue; }
      if (line.startsWith("## ")) {
        flushParagraph();
        if(inList){html += "</ul>"; inList=false;}
        const title = line.slice(3).trim();
        const id = sectionIdMap[title] || slugify(title);
        html += `<h2 id="${id}">${inlineFormat(title)}</h2>`;
        continue;
      }
      if (line.startsWith("### ")) {
        flushParagraph();
        if(inList){html += "</ul>"; inList=false;}
        html += `<h3>${inlineFormat(line.slice(4).trim())}</h3>`;
        continue;
      }
      if (line.startsWith("#### ")) {
        flushParagraph();
        if(inList){html += "</ul>"; inList=false;}
        html += `<h4>${inlineFormat(line.slice(5).trim())}</h4>`;
        continue;
      }
      if (line.startsWith("- ")) {
        flushParagraph();
        if(!inList){html += "<ul>"; inList=true;}
        const item = line.slice(2).trim();
        const cls = (item.includes("http")) ? " class='ref'" : "";
        html += `<li${cls}>${inlineFormat(item)}</li>`;
        continue;
      }
      if (line.startsWith("> ")) {
        flushParagraph();
        if(inList){html += "</ul>"; inList=false;}
        html += `<blockquote>${inlineFormat(line.slice(2).trim())}</blockquote>`;
        continue;
      }
      if (inList){ html += "</ul>"; inList = false; }
      paraBuffer.push(line);
    }
    flushParagraph();
    if(inList) html += "</ul>";
    article.innerHTML = html;

    const insertAfter = (selector, htmlBlock) => {
      const node = article.querySelector(selector);
      if (!node) return;
      node.insertAdjacentHTML("afterend", htmlBlock);
    };
